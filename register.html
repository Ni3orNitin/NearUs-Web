<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NearUs Register</title>

    <script type="module"
            src="js/app.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                    linear-gradient(
                            135deg,
                            #020617,
                            #0B1120,
                            #111827
                    );

            padding:20px;

            overflow:auto;
        }

        .registerWrapper{

            width:100%;
            max-width:1180px;

            min-height:690px;

            display:flex;

            border-radius:28px;

            overflow:hidden;

            background:#111827;

            box-shadow:
                    0 0 50px rgba(139,92,246,0.18);
        }

        /* LEFT */

        .leftSide{

            flex:1;

            background:
                    linear-gradient(
                            180deg,
                            #9F67FF,
                            #6D28D9
                    );

            padding:55px 50px;

            display:flex;
            flex-direction:column;
            justify-content:center;

            position:relative;

            overflow:hidden;
        }

        .leftSide::before{

            content:"";

            position:absolute;

            width:360px;
            height:360px;

            background:rgba(255,255,255,0.08);

            border-radius:50%;

            bottom:-120px;
            right:-80px;
        }

        .leftSide h1{

            color:white;

            font-size:68px;

            line-height:78px;

            font-weight:bold;
        }

        .leftSide p{

            margin-top:30px;

            color:#F3E8FF;

            font-size:18px;

            line-height:36px;

            max-width:460px;
        }

        /* RIGHT */

        .rightSide{

            flex:1;

            background:#020817;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:40px 50px;

            overflow-y:auto;
        }

        .registerContainer{

            width:100%;
            max-width:420px;
        }

        .logo{

            color:white;

            font-size:40px;

            font-weight:bold;

            margin-bottom:20px;
        }

        .title h1{

            color:white;

            font-size:56px;

            line-height:64px;

            margin-bottom:10px;
        }

        .title p{

            color:#9CA3AF;

            font-size:17px;

            line-height:30px;

            margin-bottom:24px;
        }

        /* INPUT */

        .inputBox{

            margin-bottom:16px;
        }

        .inputBox label{

            display:block;

            color:white;

            font-size:15px;

            margin-bottom:10px;
        }

        .inputBox input{

            width:100%;

            height:58px;

            border:none;

            outline:none;

            border-radius:18px;

            background:#1E293B;

            color:white;

            font-size:16px;

            padding:0 18px;
        }

        .inputBox input::placeholder{

            color:#94A3B8;
        }

        /* REGISTER BUTTON */

        .registerBtn{

            width:100%;

            height:58px;

            border:none;

            border-radius:18px;

            background:
                    linear-gradient(
                            90deg,
                            #8B5CF6,
                            #A855F7
                    );

            color:white;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            margin-top:8px;
        }

        .registerBtn:hover{

            transform:scale(1.01);

            opacity:0.95;
        }

        /* DIVIDER */

        .divider{

            display:flex;
            align-items:center;

            gap:15px;

            margin:22px 0;

            color:#6B7280;

            font-size:14px;
        }

        .divider div{

            flex:1;

            height:1px;

            background:#374151;
        }

        /* SOCIAL */

        .socialButtons{

            display:flex;

            gap:15px;
        }

        .socialBtn{

            flex:1;

            height:56px;

            border:none;

            border-radius:18px;

            background:#1E293B;

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .socialBtn:hover{

            background:#334155;
        }

        /* BOTTOM */

        .bottomText{

            margin-top:22px;

            text-align:center;

            color:#9CA3AF;

            font-size:15px;

            line-height:26px;
        }

        .bottomText a{

            color:#A855F7;

            text-decoration:none;

            font-weight:bold;
        }

        /* RESPONSIVE */

        @media(max-width:1000px){

            .registerWrapper{

                flex-direction:column;

                max-width:560px;
            }

            .leftSide{

                min-height:300px;
            }

            .leftSide h1{

                font-size:52px;

                line-height:62px;
            }

            .title h1{

                font-size:44px;

                line-height:54px;
            }
        }

        @media(max-width:600px){

            body{

                padding:10px;
            }

            .leftSide,
            .rightSide{

                padding:30px 24px;
            }

            .leftSide h1{

                font-size:42px;

                line-height:50px;
            }

            .leftSide p{

                font-size:16px;

                line-height:30px;
            }

            .title h1{

                font-size:36px;

                line-height:44px;
            }

            .logo{

                font-size:32px;
            }
        }

    </style>

</head>

<body>

<div class="registerWrapper">

    <!-- LEFT -->

    <div class="leftSide">

        <h1>
            Meet.<br>
            Laugh.<br>
            Stay Together.
        </h1>

        <p>
            Create your NearUs account and enjoy
            video calls, watch parties, multiplayer
            games and live chat with friends.
        </p>

    </div>

    <!-- RIGHT -->

    <div class="rightSide">

        <div class="registerContainer">

            <div class="logo">
                NearUs
            </div>

            <div class="title">

                <h1>
                    Create Account
                </h1>

                <p>
                    Join NearUs and stay connected
                    with your favorite people.
                </p>

            </div>

            <!-- NAME -->

            <div class="inputBox">

                <label>
                    Full Name
                </label>

                <input type="text"
                       id="registerName"
                       placeholder="Enter your full name">

            </div>

            <!-- EMAIL -->

            <div class="inputBox">

                <label>
                    Email Address
                </label>

                <input type="email"
                       id="registerEmail"
                       placeholder="Enter your email">

            </div>

            <!-- PASSWORD -->

            <div class="inputBox">

                <label>
                    Password
                </label>

                <input type="password"
                       id="registerPassword"
                       placeholder="Create password">

            </div>

            <!-- CONFIRM -->

            <div class="inputBox">

                <label>
                    Confirm Password
                </label>

                <input type="password"
                       id="confirmPassword"
                       placeholder="Confirm password">

            </div>

            <!-- REGISTER -->

            <button class="registerBtn"
                    onclick="registerUser()">

                Create Account

            </button>

            <!-- DIVIDER -->

            <div class="divider">

                <div></div>

                OR

                <div></div>

            </div>

            <!-- SOCIAL -->

            <div class="socialButtons">

                <button class="socialBtn"
                        onclick="googleLogin()">

                    Google

                </button>

                <button class="socialBtn">

                    Apple

                </button>

            </div>

            <!-- BOTTOM -->

            <div class="bottomText">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
