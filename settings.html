<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NearUs Settings</title>

    <link rel="stylesheet"
          href="css/style.css">

    <style>

        .settingsContainer{
            padding:35px;
            min-height:100vh;
        }

        /* TOP */

        .settingsTop{

            display:flex;
            justify-content:space-between;
            align-items:center;

            flex-wrap:wrap;

            gap:20px;
        }

        .settingsTop h1{
            font-size:42px;
        }

        .settingsTop p{
            color:#9CA3AF;
            margin-top:10px;
        }

        .saveBtn{

            padding:15px 30px;

            border:none;
            border-radius:18px;

            background:#8B5CF6;
            color:white;

            cursor:pointer;
            font-size:15px;
        }

        /* PROFILE */

        .profileCard{

            margin-top:35px;

            background:#111827;

            border-radius:35px;

            padding:30px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            flex-wrap:wrap;

            gap:25px;
        }

        .profileLeft{

            display:flex;
            align-items:center;
            gap:22px;
        }

        .profileImage{

            width:110px;
            height:110px;

            border-radius:30px;

            background:#8B5CF6;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:42px;
            font-weight:bold;
        }

        .editPhotoBtn{

            padding:14px 22px;

            border:none;
            border-radius:16px;

            background:#1F2937;
            color:white;

            cursor:pointer;
        }

        /* SETTINGS GRID */

        .settingsGrid{

            margin-top:40px;

            display:grid;

            grid-template-columns:
                    repeat(auto-fit,minmax(320px,1fr));

            gap:25px;
        }

        .settingCard{

            background:#111827;

            border-radius:30px;

            padding:28px;
        }

        .settingCard h2{
            margin-bottom:25px;
        }

        /* OPTION */

        .option{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:22px;
        }

        .optionLeft{

            display:flex;
            align-items:center;
            gap:15px;
        }

        .icon{

            width:50px;
            height:50px;

            border-radius:16px;

            background:#1F2937;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:20px;
        }

        /* SWITCH */

        .switch{

            width:60px;
            height:32px;

            background:#374151;

            border-radius:30px;

            position:relative;

            cursor:pointer;
        }

        .switch::before{

            content:"";

            width:24px;
            height:24px;

            background:white;

            border-radius:50%;

            position:absolute;

            top:4px;
            left:4px;
        }

        .switch.active{
            background:#8B5CF6;
        }

        .switch.active::before{
            left:32px;
        }

        /* INPUTS */

        .inputGroup{
            margin-bottom:22px;
        }

        .inputGroup label{
            display:block;
            margin-bottom:10px;
            color:#D1D5DB;
        }

        .inputGroup input{

            width:100%;
            height:55px;

            border:none;
            outline:none;

            background:#1F2937;

            border-radius:18px;

            padding:0 18px;

            color:white;
        }

        /* DANGER */

        .dangerCard{

            margin-top:35px;

            background:#7F1D1D;

            border-radius:30px;

            padding:28px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            flex-wrap:wrap;

            gap:20px;
        }

        .logoutBtn{

            padding:15px 28px;

            border:none;
            border-radius:18px;

            background:white;
            color:#7F1D1D;

            font-weight:bold;

            cursor:pointer;
        }

        /* MOBILE */

        @media(max-width:768px){

            .settingsContainer{
                padding:20px;
            }

            .settingsTop h1{
                font-size:34px;
            }

            .profileCard{
                flex-direction:column;
                align-items:flex-start;
            }

        }

    </style>

</head>

<body>

<div class="settingsContainer">

    <!-- TOP -->

    <div class="settingsTop">

        <div>

            <h1>
                ⚙ Settings
            </h1>

            <p>
                Customize your NearUs experience
            </p>

        </div>

        <button class="saveBtn">
            Save Changes
        </button>

    </div>

    <!-- PROFILE -->

    <div class="profileCard">

        <div class="profileLeft">

            <div class="profileImage">
                N
            </div>

            <div>

                <h2>
                    Nitin Kumar
                </h2>

                <p style="color:#9CA3AF; margin-top:10px;">
                    Android Developer • Creator
                </p>

            </div>

        </div>

        <button class="editPhotoBtn">
            Change Photo
        </button>

    </div>

    <!-- GRID -->

    <div class="settingsGrid">

        <!-- ACCOUNT -->

        <div class="settingCard">

            <h2>
                Account
            </h2>

            <div class="inputGroup">

                <label>
                    Username
                </label>

                <input type="text"
                       value="Nitin Kumar">

            </div>

            <div class="inputGroup">

                <label>
                    Email
                </label>

                <input type="email"
                       value="nitin@gmail.com">

            </div>

        </div>

        <!-- APP SETTINGS -->

        <div class="settingCard">

            <h2>
                Preferences
            </h2>

            <!-- OPTION -->

            <div class="option">

                <div class="optionLeft">

                    <div class="icon">
                        🌙
                    </div>

                    <div>

                        <h3>
                            Dark Mode
                        </h3>

                        <p style="color:#9CA3AF;">
                            Enable dark theme
                        </p>

                    </div>

                </div>

                <div class="switch active"></div>

            </div>

            <!-- OPTION -->

            <div class="option">

                <div class="optionLeft">

                    <div class="icon">
                        🔔
                    </div>

                    <div>

                        <h3>
                            Notifications
                        </h3>

                        <p style="color:#9CA3AF;">
                            Push notifications
                        </p>

                    </div>

                </div>

                <div class="switch active"></div>

            </div>

            <!-- OPTION -->

            <div class="option">

                <div class="optionLeft">

                    <div class="icon">
                        🎤
                    </div>

                    <div>

                        <h3>
                            Voice Activity
                        </h3>

                        <p style="color:#9CA3AF;">
                            Auto mic detection
                        </p>

                    </div>

                </div>

                <div class="switch"></div>

            </div>

        </div>

    </div>

    <!-- DANGER -->

    <div class="dangerCard">

        <div>

            <h2>
                Logout Account
            </h2>

            <p style="margin-top:10px; color:#F3F4F6;">

                You can securely logout from your account anytime.

            </p>

        </div>

        <button class="logoutBtn">
            Logout
        </button>

    </div>

</div>

</body>
</html>
