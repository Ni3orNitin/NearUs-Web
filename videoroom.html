<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NearUs Room</title>

<link
rel="stylesheet"
href="css/videoroom.css">

<script defer
src="js/videoroom.js"></script>

</head>

<body>

<div class="app">

    <!-- =========================
         TOP BAR
    ========================== -->

    <div class="topBar">

        <div class="topLeft">

            <h1 class="logo">
                NearUs
            </h1>

            <div class="roomTitle">
                Movie Night Room 🍿
            </div>

        </div>

        <button class="leaveBtn">
            Leave Room
        </button>

    </div>



    <!-- =========================
         MAIN LAYOUT
    ========================== -->

    <div class="mainLayout">

        <!-- =========================
             ACTIVITY SECTION
        ========================== -->

        <div class="activitySection">

            <div class="activityWindow">

                <div class="activityCenter">

                    <div class="activityIcon">
                        ✨
                    </div>

                    <h2>
                        Shared Activity Zone
                    </h2>

                    <p>
                        Movies • Games • Screen Share • Whiteboard
                    </p>

                </div>

            </div>

        </div>



        <!-- =========================
             VIDEO SIDEBAR
        ========================== -->

        <div class="videoSidebar">

            <!-- LOCAL USER -->

            <div class="videoCard">

                <video
                id="localVideo"
                autoplay
                muted
                playsinline>
                </video>

                <div class="videoLabel">
                    You
                </div>

            </div>



            <!-- REMOTE USER -->

            <div
            class="videoCard"
            id="remoteVideoCard"

            style="display:none;">

                <video
                id="remoteVideo"
                autoplay
                playsinline>
                </video>

                <div
                class="videoLabel"
                id="remoteUserLabel">

                    Connecting...

                </div>

            </div>

        </div>

    </div>



    <!-- =========================
         BOTTOM BAR
    ========================== -->

    <div class="bottomBar">

        <!-- FEATURE BUTTONS -->

        <div class="featureButtons">

            <!-- WATCH PARTY -->

            <div class="featureCard">

                <div class="featureIcon">
                    🎬
                </div>

                <div class="featureText">
                    Watch Party
                </div>

            </div>



            <!-- SCREEN SHARE -->

            <div class="featureCard">

                <div class="featureIcon">
                    🖥️
                </div>

                <div class="featureText">
                    Screen Share
                </div>

            </div>



            <!-- GAMES -->

            <div class="featureCard">

                <div class="featureIcon">
                    🎮
                </div>

                <div class="featureText">
                    Games
                </div>

            </div>



            <!-- WHITEBOARD -->

            <div class="featureCard">

                <div class="featureIcon">
                    ✏️
                </div>

                <div class="featureText">
                    Whiteboard
                </div>

            </div>

        </div>



        <!-- CONTROL BUTTONS -->

        <div class="bottomCenter">

            <!-- MIC -->

            <button class="controlBtn">
                🎤
            </button>



            <!-- CAMERA -->

            <button class="controlBtn">
                📹
            </button>



            <!-- EMOJI -->

            <button class="controlBtn">
                😊
            </button>



            <!-- END CALL -->

            <button class="endCallBtn">
                📞
            </button>

        </div>

    </div>

</div>

</body>

</html>
