<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NearUs Room</title>

<link
rel="stylesheet"
href="css/videoroom.css">

<script
type="module"
src="js/videoroom.js"></script>

</head>

<body>

<div class="app">

    <!-- TOP BAR -->

    <div class="topBar">

        <div class="topLeft">

            <h1 class="logo">
                NearUs
            </h1>

            <div class="roomTitle">
                Movie Night Room 🍿
            </div>

        </div>



        <!-- ROOM INFO -->

        <div class="roomInfo">

            <div class="roomCodeBox">

                <span>
                    Room:
                </span>

                <span id="roomCode">
                    ----
                </span>

            </div>

            <button id="copyRoomBtn">

                Copy Link

            </button>

        </div>



        <button class="leaveBtn">
            Leave Room
        </button>

    </div>



    <!-- MAIN -->

    <div class="mainLayout">

        <!-- ACTIVITY -->

        <div class="activitySection">

            <div class="activityWindow">

                <div class="activityCenter">

                    <div class="activityIcon">
                        ✨
                    </div>

                    <h2>
                        Shared Activity Zone
                    </h2>

                    <p>
                        Movies • Games • Screen Share • Whiteboard
                    </p>

                </div>

            </div>

        </div>



        <!-- VIDEO -->

        <div class="videoSidebar">

            <div class="videoCard">

                <video
                id="localVideo"
                autoplay
                muted
                playsinline>
                </video>

                <div class="videoLabel">
                    You
                </div>

            </div>



            <div
            class="videoCard"
            id="remoteVideoCard">

                <video
                id="remoteVideo"
                autoplay
                playsinline>
                </video>

                <div
                class="videoLabel"
                id="remoteUserLabel">

                    Friend

                </div>

            </div>

        </div>

    </div>



    <!-- BOTTOM BAR -->

    <div class="bottomBar">

        <div class="featureButtons">

            <div class="featureCard">

                <div class="featureIcon">
                    🎬
                </div>

                <div class="featureText">
                    Watch Party
                </div>

            </div>



            <div class="featureCard">

                <div class="featureIcon">
                    🖥️
                </div>

                <div class="featureText">
                    Screen Share
                </div>

            </div>



            <div class="featureCard">

                <div class="featureIcon">
                    🎮
                </div>

                <div class="featureText">
                    Games
                </div>

            </div>



            <div class="featureCard">

                <div class="featureIcon">
                    ✏️
                </div>

                <div class="featureText">
                    Whiteboard
                </div>

            </div>

        </div>



        <!-- CONTROLS -->

        <div class="bottomCenter">

            <button class="controlBtn">
                🎤
            </button>

            <button class="controlBtn">
                📹
            </button>

            <button class="controlBtn">
                😊
            </button>

            <button class="endCallBtn">
                📞
            </button>

        </div>

    </div>

</div>

</body>

</html>
